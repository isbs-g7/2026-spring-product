name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Check PHP syntax (all .php files)
        run: |
          find . -name "*.php" \
            -not -path "./.git/*" \
            -not -name "config.php" \
            | xargs -I{} php -l {}

  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: event_board_test
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: pdo_pgsql

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Setup test DB
        env:
          PGPASSWORD: ci_pass
        run: |
          psql -h localhost -U ci_user -d event_board_test -f sql/schema.sql
          psql -h localhost -U ci_user -d event_board_test -f sql/seed.sql

      - name: Run tests
        run: composer test
