<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベント詳細 — 大学イベント掲示板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- ナビゲーション -->
  <header class="bg-white shadow-sm">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/pages/index.html" class="text-indigo-600 font-bold text-lg tracking-tight">
        大学イベント掲示板
      </a>
      <nav id="main-nav" class="flex items-center gap-5 text-sm"></nav>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="flex-1 max-w-4xl mx-auto w-full px-4 py-10">

    <!-- ローディング表示 -->
    <div id="loading" class="text-center py-10">
      <p class="text-gray-600">読み込み中...</p>
    </div>

    <!-- エラー表示 -->
    <div id="error-container" class="hidden mb-6 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700"></div>

    <!-- イベント詳細コンテンツ -->
    <div id="event-content" class="hidden space-y-6">

      <!-- ヘッダー（タイトル + 操作ボタン） -->
      <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
        <div class="flex-1">
          <h1 id="event-title" class="text-3xl font-bold text-gray-900 mb-2"></h1>
          <div id="event-category" class="inline-block px-3 py-1 text-sm font-medium text-white rounded-lg"></div>
        </div>

        <!-- 操作ボタン（主催者のみ表示） -->
        <div id="action-buttons" class="hidden flex gap-3">
          <a id="edit-btn" href="#" 
             class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
            編集
          </a>
          <button id="delete-btn" type="button"
                  class="px-4 py-2 bg-red-600 text-white text-sm font-medium rounded-lg hover:bg-red-700 transition-colors">
            削除
          </button>
        </div>
      </div>

      <!-- 基本情報カード -->
      <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">イベント情報</h2>
        <dl class="space-y-4 text-sm">
          <div class="flex gap-4">
            <dt class="w-28 text-gray-600 font-medium shrink-0">開催日時</dt>
            <dd id="event-date" class="text-gray-800"></dd>
          </div>
          <div class="flex gap-4">
            <dt class="w-28 text-gray-600 font-medium shrink-0">終了日時</dt>
            <dd id="event-end-date" class="text-gray-800"></dd>
          </div>
          <div class="flex gap-4">
            <dt class="w-28 text-gray-600 font-medium shrink-0">開催方式</dt>
            <dd id="event-online" class="text-gray-800"></dd>
          </div>
          <div class="flex gap-4">
            <dt class="w-28 text-gray-600 font-medium shrink-0">開催場所</dt>
            <dd id="event-location" class="text-gray-800"></dd>
          </div>
          <div class="flex gap-4">
            <dt class="w-28 text-gray-600 font-medium shrink-0">定員</dt>
            <dd id="event-capacity" class="text-gray-800"></dd>
          </div>
        </dl>
      </section>

      <!-- 説明セクション -->
      <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">イベント詳細</h2>
        <div id="event-description" class="prose prose-sm max-w-none text-gray-700 whitespace-pre-wrap"></div>
      </section>

      <!-- 主催者情報 -->
      <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">主催者</h2>
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-indigo-100 text-indigo-600 text-sm font-bold flex items-center justify-center" id="organizer-avatar"></div>
          <div>
            <p id="organizer-name" class="font-medium text-gray-800"></p>
            <p id="organizer-email" class="text-sm text-gray-600"></p>
          </div>
        </div>
      </section>

      <!-- 参加ボタンエリア -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <button id="participate-btn" type="button"
                class="w-full px-4 py-3 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition-colors">
          このイベントに参加する
        </button>
      </div>

    </div>

  </main>

  <!-- 削除確認モーダル -->
  <div id="delete-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 max-w-sm mx-auto">
      <h3 class="text-lg font-semibold text-gray-900 mb-2">イベントを削除しますか？</h3>
      <p class="text-gray-600 text-sm mb-6">この操作は取り消せません。</p>
      <div class="flex gap-3 justify-end">
        <button id="modal-cancel" type="button"
                class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
          キャンセル
        </button>
        <button id="modal-confirm" type="button"
                class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
          削除する
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/event-detail.js"></script>

</body>
</html>
