<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ — 大学イベント掲示板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- ナビゲーション -->
  <header class="bg-white shadow-sm">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/pages/index.html" class="text-indigo-600 font-bold text-lg tracking-tight">
        大学イベント掲示板
      </a>
      <nav id="main-nav" class="flex items-center gap-5 text-sm"></nav>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-10 space-y-6">
    <h1 class="text-2xl font-bold text-gray-800">マイページ</h1>

    <!-- プロフィールカード -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h2 class="text-base font-semibold text-gray-700 mb-4">プロフィール</h2>
      <dl class="space-y-3 text-sm">
        <div class="flex gap-4">
          <dt class="w-24 text-gray-500 shrink-0">表示名</dt>
          <dd id="profile-name" class="text-gray-800 font-medium">—</dd>
        </div>
        <div class="flex gap-4">
          <dt class="w-24 text-gray-500 shrink-0">メール</dt>
          <dd id="profile-email" class="text-gray-800">—</dd>
        </div>
        <div class="flex gap-4">
          <dt class="w-24 text-gray-500 shrink-0">登録日</dt>
          <dd id="profile-created" class="text-gray-800">—</dd>
        </div>
      </dl>
    </section>

    <!-- パスワード変更 -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h2 class="text-base font-semibold text-gray-700 mb-4">パスワード変更</h2>

      <!-- 成功メッセージ -->
      <div id="pw-success" class="hidden mb-4 px-4 py-3 bg-green-50 border border-green-200
                                   rounded-lg text-sm text-green-700">
        パスワードを変更しました。
      </div>
      <!-- エラーメッセージ -->
      <div id="pw-error" class="hidden mb-4 px-4 py-3 bg-red-50 border border-red-200
                                 rounded-lg text-sm text-red-700"></div>

      <form id="password-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="current-password">
            現在のパスワード
          </label>
          <input id="current-password" name="current_password" type="password"
                 autocomplete="current-password" required placeholder="••••••••"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent
                        placeholder-gray-400 transition">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="new-password">
            新しいパスワード
          </label>
          <input id="new-password" name="new_password" type="password"
                 autocomplete="new-password" required minlength="8"
                 placeholder="••••••••（8文字以上）"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent
                        placeholder-gray-400 transition">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="new-password-confirm">
            新しいパスワード（確認）
          </label>
          <input id="new-password-confirm" name="new_password_confirm" type="password"
                 autocomplete="new-password" required placeholder="••••••••"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent
                        placeholder-gray-400 transition">
        </div>

        <button type="submit"
                class="bg-indigo-600 text-white font-medium px-5 py-2.5 rounded-lg text-sm
                       hover:bg-indigo-700 active:bg-indigo-800 transition-colors
                       disabled:opacity-50 disabled:cursor-not-allowed">
          変更する
        </button>
      </form>
    </section>

    <!-- 自分のイベント一覧 -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-semibold text-gray-700">自分のイベント</h2>
        <a href="/pages/create-event.html"
           class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">
          + 新規作成
        </a>
      </div>

      <!-- ローディング -->
      <div id="events-loading" class="text-center py-8">
        <p class="text-gray-500 text-sm">読み込み中…</p>
      </div>

      <!-- エラー -->
      <div id="events-error" class="hidden px-4 py-3 bg-red-50 border border-red-200
                                    rounded-lg text-sm text-red-700"></div>

      <!-- イベント一覧 -->
      <div id="events-list" class="space-y-3"></div>

      <!-- 空の状態 -->
      <div id="events-empty" class="hidden text-center py-8">
        <p class="text-gray-500 text-sm mb-2">まだイベントを作成していません</p>
        <a href="/pages/create-event.html"
           class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">
          イベントを作成する →
        </a>
      </div>
    </section>

  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    (async () => {
      // ログイン必須ページ（未ログインなら login.html へ）
      const user = await initAuth(true);
      if (!user) return;

      // プロフィール表示
      document.getElementById('profile-name').textContent    = user.display_name;
      document.getElementById('profile-email').textContent   = user.email;
      document.getElementById('profile-created').textContent =
        new Date(user.created_at).toLocaleDateString('ja-JP');

      // パスワード変更フォーム
      document.getElementById('password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn        = e.target.querySelector('button[type="submit"]');
        const errorDiv   = document.getElementById('pw-error');
        const successDiv = document.getElementById('pw-success');
        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        const newPassword        = document.getElementById('new-password').value;
        const newPasswordConfirm = document.getElementById('new-password-confirm').value;

        if (newPassword !== newPasswordConfirm) {
          errorDiv.textContent = '新しいパスワードが一致しません';
          errorDiv.classList.remove('hidden');
          return;
        }

        btn.disabled = true;
        btn.textContent = '変更中…';

        try {
          await api.post('/api/users/password.php', {
            current_password: document.getElementById('current-password').value,
            new_password:     newPassword,
          });
          successDiv.classList.remove('hidden');
          e.target.reset();
        } catch (err) {
          errorDiv.textContent = err.message;
          errorDiv.classList.remove('hidden');
        } finally {
          btn.disabled = false;
          btn.textContent = '変更する';
        }
      });

      // 自分のイベント一覧を取得
      const loadUserEvents = async () => {
        const loadingDiv = document.getElementById('events-loading');
        const errorDiv   = document.getElementById('events-error');
        const listDiv    = document.getElementById('events-list');
        const emptyDiv   = document.getElementById('events-empty');

        loadingDiv.classList.remove('hidden');
        errorDiv.classList.add('hidden');
        listDiv.innerHTML = '';
        emptyDiv.classList.add('hidden');

        try {
          const res = await api.get('/api/users/events.php');
          const events = res.events || [];

          if (events.length === 0) {
            loadingDiv.classList.add('hidden');
            emptyDiv.classList.remove('hidden');
            return;
          }

          // イベント一覧を表示
          listDiv.innerHTML = events.map(event => {
            const eventDate = new Date(event.event_date);
            const statusBadge = {
              'draft': '<span class="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded font-medium">下書き</span>',
              'published': '<span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded font-medium">公開中</span>',
              'cancelled': '<span class="px-2 py-1 bg-red-100 text-red-700 text-xs rounded font-medium">キャンセル</span>',
              'completed': '<span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded font-medium">完了</span>',
            }[event.status] || '';

            return `
              <div class="border border-gray-200 rounded-lg p-4 hover:bg-gray-50 transition">
                <div class="flex items-start justify-between gap-3">
                  <div class="flex-1">
                    <h3 class="font-semibold text-gray-800 text-sm">${event.title}</h3>
                    <p class="text-gray-600 text-xs mt-1 line-clamp-2">${event.description}</p>
                    <div class="flex items-center gap-2 mt-2 text-xs text-gray-500">
                      <span>📍 ${event.location}</span>
                      <span>📅 ${eventDate.toLocaleDateString('ja-JP')}</span>
                    </div>
                  </div>
                  <div class="flex items-center gap-2">
                    ${statusBadge}
                    <a href="/pages/event-detail.html?id=${event.id}"
                       class="text-indigo-600 hover:text-indigo-700 text-xs font-medium">
                      詳細 →
                    </a>
                  </div>
                </div>
              </div>
            `;
          }).join('');

          loadingDiv.classList.add('hidden');
        } catch (err) {
          loadingDiv.classList.add('hidden');
          errorDiv.textContent = err.message || 'イベント一覧の取得に失敗しました';
          errorDiv.classList.remove('hidden');
        }
      };

      await loadUserEvents();
    })();
  </script>
</body>
</html>
